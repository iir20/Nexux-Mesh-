name: Automated Security Scan

on: [push, pull_request]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Make Gradle executable
      run: chmod +x gradlew

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: false

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        fi
    
    - name: Run Security Audit Lint
      run: ./gradlew lintDebug || true
      
    - name: Dependency Check Scan
      uses: dependency-check/Dependency-Check_Action@main
      env:
        JAVA_HOME: /opt/jdk
      with:
        project: 'NEXUS MESH'
        format: 'HTML'
        out: 'reports'
        args: '--exclude gradle/wrapper/gradle-wrapper.jar'

    - name: Upload Security and Dependency Check Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-and-dependency-reports
        path: |
          app/build/reports/lint-results-debug.html
          reports/