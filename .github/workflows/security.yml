name: Automated Security Scan

on: [push, pull_request]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradle
      run: chmod +x gradlew || true

    - name: Decode Debug Keystore
      run: base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
    
    - name: Run Security Audit Lint
      run: ./gradlew lintDebug || true
      
    - name: Dependency Check Scan
      uses: owasp/dependency-check-action@v2
      with:
        project: 'NEXUS MESH'
        format: 'HTML'
        out: 'reports'
        args: '--scan app/build.gradle.kts'