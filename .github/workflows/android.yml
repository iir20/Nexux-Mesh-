name: Android Core Integration CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradle
      run: chmod +x gradlew || true

    - name: Run Room Schema Verification
      run: ./gradlew :app:kspDebugKotlin || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug