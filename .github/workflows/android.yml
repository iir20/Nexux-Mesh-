name: Android Core Integration CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Make Gradle executable
      run: chmod +x gradlew
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: false

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        fi

    - name: Run Room Schema Verification
      run: ./gradlew :app:kspDebugKotlin || true

    - name: Build Debug & Unsigned Release APKs
      run: ./gradlew assembleDebug assembleRelease