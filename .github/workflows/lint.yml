name: Static Analysis & Linting

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradle
      run: chmod +x gradlew || true

    - name: Decode Debug Keystore
      run: base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore

    - name: Run ktlint Check
      run: ./gradlew ktlintCheck || true

    - name: Run detekt Static Analysis
      run: ./gradlew detekt || true

    - name: Upload ktlint/detekt Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-and-detekt-reports
        path: |
          app/build/reports/ktlint/
          app/build/reports/detekt/
          build/reports/detekt/